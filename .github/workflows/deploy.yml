name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wc3-tools/package-lock.json

      - name: Install dependencies
        working-directory: wc3-tools
        run: npm ci

      - name: Build demo
        working-directory: wc3-tools
        run: npx vite build --base /warcraft-ui/ --outDir dist-demo

      - uses: actions/upload-pages-artifact@v3
        with:
          path: wc3-tools/dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
